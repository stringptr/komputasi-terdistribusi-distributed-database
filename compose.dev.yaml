services:
  yugabyte:
    image: yugabytedb/yugabyte:latest
    container_name: yugabyte-node
    restart: unless-stopped
    profiles: ["db", "dev"]
    ports:
      - "15433:15433"   
      - "5433:5433"     
      - "9042:9042"     
      - "7000:7000"     
      - "9000:9000"     
    volumes:
      - ./yugabyte_data:/home/yugabyte/yb_data:z
    command:
      - bin/yugabyted
      - start
      - --join={$LEADER_IP}
      - --background=false

  app:
    build:
      context: ./app
      target: development
    network_mode: host
    volumes:
      - ./app:/app:z
      - /app/node_modules
      - /app/.next
    depends_on:
      yugabyte:
        required: false
        condition: service_started
    environment:
      - NODE_ENV=development
      - DB_HOSTS=${DB_HOSTS}
      - YB_DATABASE=${YB_DATABASE}
      - YB_USER=${YB_USER}
      - YB_PASSWORD=${YB_PASSWORD}
    profiles: ["app", "dev"]
    restart: unless-stopped
